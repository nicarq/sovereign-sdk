[package]
name = "sov-evm"
description = "A Sovereign SDK managing fungible tokens"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"
publish = false

[dependencies]
sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }
sov-chain-state = { path = "../sov-chain-state", version = "0.3" }

anyhow = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
schemars = { workspace = true, optional = true }
clap = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc"] }
hex = { workspace = true }
jsonrpsee = { workspace = true, features = [
    "macros",
    "client-core",
    "server",
], optional = true }
tracing = { workspace = true }
derive_more = { workspace = true, default-features = true }
lazy_static = "1.4.0"


ethereum-types = { workspace = true }
ethers-core = { workspace = true }
ethers-contract = { workspace = true }
ethers-signers = { workspace = true }

revm = { workspace = true, features = [
    "optional_block_gas_limit",
    "optional_eip3607",
    "optional_no_base_fee",
] }
reth-primitives = { workspace = true }
reth-interfaces = { workspace = true, optional = true }
reth-rpc-types = { workspace = true }
reth-rpc-types-compat = { workspace = true }
reth-revm-inspectors = { workspace = true, features = [] }
secp256k1 = { workspace = true }

[dev-dependencies]
sov-evm = { path = ".", features = ["smart_contracts"] }
tokio = { workspace = true }
tempfile = { workspace = true }
bytes = { workspace = true }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }


[features]
default = []
native = [
	"clap",
	"jsonrpsee",
	"reth-interfaces",
	"schemars",
	"serde_json",
	"sov-chain-state/native",
	"sov-evm/native",
	"sov-mock-da/native",
	"sov-modules-api/native",
	"sov-state/native",
]
experimental = [ "sov-evm/experimental" ]
# For testing smart contract
smart_contracts = [ "experimental", "native" ]
