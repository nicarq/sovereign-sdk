[package]
name = "sov-evm"
description = "A Sovereign SDK managing fungible tokens"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"
publish = false

[lints]
workspace = true

[dependencies]
sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }
sov-chain-state = { path = "../sov-chain-state", version = "0.3" }

anyhow = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
schemars = { workspace = true, optional = true }
clap = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc"] }
hex = { workspace = true }
jsonrpsee = { workspace = true, features = [
    "macros",
    "client-core",
    "server",
], optional = true }
tracing = { workspace = true }
derive_more = { workspace = true, default-features = true }
lazy_static = "1.4.0"

secp256k1 = { workspace = true }

alloy-sol-types = { version = "0.6" }
alloy-rpc-types = { workspace = true, optional = true }
revm = { workspace = true, features = [
    "optional_block_gas_limit",
    "optional_eip3607",
    "optional_no_base_fee",
    "std",
    "secp256k1"
] }
reth-primitives = { workspace = true }
reth-rpc-types = { workspace = true }
revm-inspectors = { workspace = true, optional = true }
revm-primitives = { workspace = true }


[dev-dependencies]
sov-evm = { path = ".", features = ["native"] }
tokio = { workspace = true }
tempfile = { workspace = true }
bytes = { workspace = true }
ethers-signers = { workspace = true }
ethers-core = { workspace = true }

sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }
sov-test-utils = { path = "../../sov-test-utils" }
sov-eth-dev-signer = { path = "../../../full-node/sov-eth-dev-signer" }


[features]
default = []
native = [
	"alloy-rpc-types",
	"clap",
	"jsonrpsee",
	"revm-inspectors",
	# Optional for speed up in native mode
	# "revm/asm-keccak"
	"schemars",
	"serde_json",
	"sov-chain-state/native",
	"sov-evm/native",
	"sov-mock-da/native",
	"sov-modules-api/native",
	"sov-state/native",
]
experimental = [ "sov-evm/experimental" ]
