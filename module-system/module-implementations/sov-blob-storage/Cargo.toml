[package]
name = "sov-blob-storage"
description = "A Sovereign SDK module for holding blobs from Data Availability Layer"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
version = { workspace = true }
readme = "README.md"

resolver = "2"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
borsh = { workspace = true }
bincode = { workspace = true }
tracing = { workspace = true }
hex = { workspace = true }

sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }
sov-sequencer-registry = { path = "../sov-sequencer-registry", version = "0.3" }
sov-chain-state = { path = "../sov-chain-state", version = "0.3" }

schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
jsonrpsee = { workspace = true, optional = true }
clap = { workspace = true, optional = true }


[dev-dependencies]
tempfile = { workspace = true }
sov-blob-storage = { path = ".", features = ["native"] }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }
sov-bank = { path = "../sov-bank" }
sov-test-utils = { path = "../../sov-test-utils" }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-modules-stf-blueprint = { path = "../../sov-modules-stf-blueprint", features = ["native", "test-utils"] }
sov-soft-confirmations-kernel = { path = "../../sov-soft-confirmations-kernel", features = ["native", "test-utils"] }

[features]
default = []
native = [
	"clap",
	"jsonrpsee",
	"schemars",
	"serde_json",
	"sov-bank/native",
	"sov-blob-storage/native",
	"sov-chain-state/native",
	"sov-mock-da/native",
	"sov-modules-api/native",
	"sov-modules-stf-blueprint/native",
	"sov-sequencer-registry/native",
	"sov-soft-confirmations-kernel/native",
	"sov-state/native",
]
