[package]
name = "sov-sequencer-registry"
description = "A Sovereign SDK module for registering rollup sequencers"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"

resolver = "2"

[lints]
workspace = true

[dependencies]
thiserror = { workspace = true }
anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
clap = { workspace = true, optional = true }
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
sov-bank = { path = "../sov-bank", version = "0.3" }
sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc"] }
jsonrpsee = { workspace = true, features = ["macros", "client-core", "server"], optional = true }
risc0-cycle-macros = { workspace = true, optional = true }
risc0-cycle-utils = { workspace = true, optional = true }
risc0-zkvm = { workspace = true, default-features = false, features = ["std"], optional = true }
risc0-zkvm-platform = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
sov-sequencer-registry = { path = ".", features = ["native"] }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }
sov-test-utils = { path = "../../sov-test-utils" }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }

[features]
bench = [
	"risc0-cycle-macros",
	"risc0-cycle-macros?/bench",
	"risc0-cycle-utils",
	"risc0-zkvm",
	"risc0-zkvm-platform",
	"sov-modules-api/bench",
	"sov-sequencer-registry/bench",
	"sov-state/bench",
]
default = []
arbitrary = [
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-derive",
	"sov-modules-api/arbitrary",
	"sov-sequencer-registry/arbitrary",
	"sov-state/arbitrary",
	"sov-test-utils/arbitrary",
]
native = [
	"clap",
	"jsonrpsee",
	"risc0-cycle-utils?/native",
	"schemars",
	"serde_json",
	# This:
	"sov-bank/native",
	"sov-mock-da/native",
	"sov-modules-api/native",
	"sov-sequencer-registry/native",
	"sov-state/native",
]
