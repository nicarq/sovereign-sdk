[package]
name = "sov-prover-incentives"
description = "A Sovereign SDK module for incentivizing provers"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"

[lints]
workspace = true

[dev-dependencies]
tempfile = { workspace = true }
sov-prover-incentives = { features = ["native"], path = "." }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }
sov-mock-zkvm = { path = "../../../adapters/mock-zkvm", features = ["native"] }
sov-modules-api = { path = "../../sov-modules-api", version = "0.3", features = ["native", "test-utils"] }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }

[dependencies]
anyhow = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
thiserror = { workspace = true }
jsonrpsee = { workspace = true, features = ["macros", "client-core", "server"], optional = true }

sov-bank = { path = "../sov-bank", version = "0.3" }
sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }
sov-chain-state = { path = "../sov-chain-state", version = "0.3" }

[features]
default = []
native = [
    "jsonrpsee",
    "schemars",
    "sov-bank/native",
    "sov-chain-state/native",
    "sov-mock-da/native",
    "sov-mock-zkvm/native",
    "sov-modules-api/native",
    "sov-prover-incentives/native",
    "sov-state/native",
]
