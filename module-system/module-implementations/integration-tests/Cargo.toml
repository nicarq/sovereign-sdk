[package]
name = "integration-tests"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
publish = false
resolver = "2"

[lints]
workspace = true

[dev-dependencies]
integration-tests = { path = ".", features = ["native"] }

anyhow = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
tempfile = { workspace = true }
serde = { workspace = true }
jsonrpsee = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
rockbound = { workspace = true }

sov-modules-api = { path = "../../sov-modules-api", features = ["native"] }
sov-state = { path = "../../sov-state", features = ["native"] }

sov-mock-zkvm = { path = "../../../adapters/mock-zkvm", features = ["native"] }
sov-test-utils = { path = "../../sov-test-utils" }
sov-rollup-interface = { path = "../../../rollup-interface", features = ["native"] }
sov-mock-da = { path = "../../../adapters/mock-da", features = ["native"] }
sov-modules-stf-blueprint = { path = "../../sov-modules-stf-blueprint", features = ["native", "test-utils"] }

sov-attester-incentives = { path = "../sov-attester-incentives" }
sov-chain-state = { path = "../sov-chain-state", features = ["native"] }
sov-value-setter = { path = "../sov-value-setter", features = ["native"] }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-sequencer-registry = { path = "../sov-sequencer-registry" }
sov-bank = { path = "../sov-bank" }

[features]
default = []
native = [
	"integration-tests/native",
	"sov-attester-incentives/native",
	"sov-bank/native",
	"sov-chain-state/native",
	"sov-mock-da/native",
	"sov-mock-zkvm/native",
	"sov-modules-api/native",
	"sov-modules-stf-blueprint/native",
	"sov-rollup-interface/native",
	"sov-sequencer-registry/native",
	"sov-state/native",
	"sov-value-setter/native",
]
