[package]
name = "sov-nft-module"
description = "A Sovereign SDK module for managing non-fungible tokens"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = "sovereign.xyz"
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
serde = { workspace = true }
schemars = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
jsonrpsee = { workspace = true, features = ["macros", "client-core", "server"], optional = true }

sov-modules-api = { path = "../../sov-modules-api" }
sov-modules-macros = { path = "../../sov-modules-macros" }
sov-state = { path = "../../sov-state" }

postgres = { version = "0.19.7", optional = true }
tokio = { version = "1.35.0", features = ["full"], optional = true }
tracing = { workspace = true, optional = true }

[dev-dependencies]
sov-nft-module = { version = "*", features = ["native"], path = "." }
tempfile = { workspace = true }
sov-test-utils = { path = "../../sov-test-utils" }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }


[features]
default = []
offchain = [ "postgres", "sov-nft-module/offchain", "tokio", "tracing" ]
native = [
	"jsonrpsee",
	"schemars",
	"serde_json",
	"sov-modules-api/native",
	"sov-modules-macros/native",
	"sov-nft-module/native",
	"sov-state/native",
]
test = [ "native" ]
