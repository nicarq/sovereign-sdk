[package]
name = "sov-chain-state"
authors = { workspace = true }
description = "A Sovereign SDK module for storing a rollup's historical state"
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"

[lints]
workspace = true

[dependencies]
thiserror = { workspace = true }
anyhow = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
serde = { workspace = true }
jsonrpsee = { workspace = true, features = ["client-core"], optional = true }
tracing = { workspace = true }
derivative = { workspace = true }

sov-modules-api = { path = "../../sov-modules-api", version = "0.3" }
sov-state = { path = "../../sov-state", version = "0.3" }

[dev-dependencies]
sov-chain-state = { path = ".", features = ["native", "test-utils"] }
tempfile = { workspace = true }
sov-test-utils = { path = "../../sov-test-utils" }
sov-mock-da = { path = "../../../adapters/mock-da" }
sov-mock-zkvm = { path = "../../../adapters/mock-zkvm" }
sov-modules-api = { path = "../../sov-modules-api", version = "0.3", features = ["mocks"] }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }


[features]
default = []
test-utils = []
native = [
	"jsonrpsee",
	"sov-chain-state/native",
	"sov-mock-da/native",
	"sov-mock-zkvm/native",
	"sov-modules-api/native",
	"sov-state/native",
]
