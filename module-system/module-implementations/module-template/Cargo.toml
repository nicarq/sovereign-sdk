[package]
name = "module-template"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
publish = false
resolver = "2"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc"] }
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }

sov-bank = { path = "../sov-bank" }
sov-modules-api = { path = "../../sov-modules-api" }
sov-state = { path = "../../sov-state" }


[dev-dependencies]
tempfile = { workspace = true }
module-template = { path = ".", version = "*", features = ["native"] }
sov-test-utils = { path = "../../sov-test-utils" }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }

[features]
default = []
arbitrary = [
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-derive",
	"module-template/arbitrary",
	"sov-modules-api/arbitrary",
	"sov-state/arbitrary",
	"sov-test-utils/arbitrary",
]
native = [
	"module-template/native",
	"schemars",
	"serde_json",
	"sov-bank/native",
	"sov-modules-api/native",
	"sov-state/native",
]
