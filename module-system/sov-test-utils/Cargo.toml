[package]
name = "sov-test-utils"
description = "A set of utils for testing the Sovereign SDK"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
resolver = "2"
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
axum-server = { workspace = true }
borsh = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }

ethereum-types = { workspace = true }
ethers-core = { workspace = true }
ethers-contract = { workspace = true }

demo-stf = { path = "../../examples/demo-rollup/stf", features = ["native"], optional = true }
sha2 = { workspace = true }
sov-rollup-interface = { path = "../../rollup-interface" }
sov-modules-api = { path = "../sov-modules-api", features = ["native", "test-utils"] }
sov-modules-stf-blueprint = { path = "../sov-modules-stf-blueprint", features = ["native", "test-utils"] }
sov-stf-runner = { path = "../../full-node/sov-stf-runner" }
sov-value-setter = { path = "../module-implementations/sov-value-setter", features = ["native"] }
sov-attester-incentives = { path = "../module-implementations/sov-attester-incentives", features = ["native"] }
sov-bank = { path = "../module-implementations/sov-bank", features = ["native"] }
sov-kernels = { path = "../sov-kernels", features = ["native"] }
sov-ledger-apis = { path = "../../full-node/sov-ledger-apis", features = ["server"] }
sov-ledger-json-client = { path = "../../full-node/sov-ledger-json-client" }
sov-sequencer-json-client = { path = "../../full-node/sov-sequencer-json-client" }
sov-capabilities = { path = "../sov-capabilities", features = ["native"] }
sov-prover-storage-manager = { path = "../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-sequencer = { path = "../../full-node/sov-sequencer" }
sov-sequencer-registry = { path = "../module-implementations/sov-sequencer-registry", features = ["native"] }
sov-chain-state = { path = "../module-implementations/sov-chain-state", features = ["native"] }
sov-db = { path = "../../full-node/sov-db" }
sov-state = { path = "../sov-state" }
sov-mock-da = { path = "../../adapters/mock-da", features = ["native"] }
sov-mock-zkvm = { path = "../../adapters/mock-zkvm", features = ["native"] }
tempfile = { workspace = true }
tracing-subscriber = { version = "0.3.17", features = ["env-filter"] }
jsonrpsee = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }

[features]
default = []
# Not every downstream user of this crate may want to / can use `demo-stf` as a
# dependency, so it's optional.
demo-stf = ["dep:demo-stf"]
arbitrary = [
    "ethereum-types/arbitrary",
    "sov-db/arbitrary",
    "sov-mock-zkvm/arbitrary",
    "sov-modules-api/arbitrary",
    "sov-rollup-interface/arbitrary",
    "sov-sequencer-registry/arbitrary",
    "sov-state/arbitrary",
]
