[package]
name = "sov-state"
description = "Defines traits and types for state storage in the Sovereign SDK module system"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"

[dependencies]
anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc", "bytes"] }
bcs = { workspace = true }
derivative = { workspace = true }
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
serde = { workspace = true, features = ["rc"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
sov-rollup-interface = { path = "../../rollup-interface", version = "0.3" }
sov-modules-core = { path = "../sov-modules-core", version = "0.3" }
sov-db = { path = "../../full-node/db/sov-db", version = "0.3", optional = true }
jmt = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }

risc0-cycle-macros = { workspace = true, optional = true }
risc0-zkvm = { workspace = true, default-features = false, features = ["std"], optional = true }
risc0-zkvm-platform = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }

[features]
arbitrary = [
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-derive",
	"sov-db?/arbitrary",
	"sov-modules-core/arbitrary",
	"sov-rollup-interface/arbitrary",
]
bench = [
	"risc0-cycle-macros",
	"risc0-cycle-macros?/bench",
	"risc0-zkvm",
	"risc0-zkvm-platform",
]
default = []
native = [ "sov-db", "sov-modules-core/native", "sov-rollup-interface/native" ]
