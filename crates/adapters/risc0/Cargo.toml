[package]
name = "sov-risc0-adapter"
authors = { workspace = true }
description = "An adapter allowing Risc0 to be used with the Sovereign SDK"
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
version = { workspace = true }
readme = "README.md"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
bincode = { workspace = true }
borsh = { workspace = true }
digest = { workspace = true }
risc0-zkvm = { workspace = true, default-features = false, features = ["std"] }
risc0-zkvm-platform = { workspace = true }
serde = { workspace = true }
bytemuck = "1.15.0"
once_cell = { workspace = true, optional = true }
parking_lot = { version = "0.12.1", optional = true }
sov-cycle-utils = { workspace = true, features = ["risc0"], optional = true }
sov-rollup-interface = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true, optional = true }

sha2 = { version = "0.10.6" }

# Corresponding release: <https://github.com/risc0/curve25519-dalek/releases/tag/curve25519-4.1.0-risczero.1>
ed25519-dalek = { git = "https://github.com/risc0/curve25519-dalek", rev = "42c4faf7dc3f640a7e3f7e4cbf43e7d5d6d46b67", features = [
    "serde",
] }

arbitrary = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }

[features]
default = []
native = [
    "ed25519-dalek/default",
    "ed25519-dalek/rand_core",
    "rand",
    "sov-cycle-utils?/native",
    "risc0-zkvm/prove",
    "sov-rollup-interface/native",
]
bench = ["once_cell", "parking_lot", "sov-cycle-utils"]
arbitrary = ["dep:arbitrary", "sov-rollup-interface/arbitrary"]
bincode = []

[[test]]
name = "native"
required-features = ["native"]
