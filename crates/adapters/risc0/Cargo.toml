[package]
name = "sov-risc0-adapter"
description = "An adapter allowing Risc0 to be used with the Sovereign SDK"
version = "0.3.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Sovereign Labs <info@sovereign.xyz>"]
homepage = "https://www.sovereign.xyz"
repository = "https://github.com/sovereign-labs/sovereign-sdk"

readme = "README.md"

[lints.rust]
dead_code = "deny"
non_ascii_idents = "deny" # Bad for readability and it can also be a security vulnerability

# In case you need inspiration for new lints to add to the list, this is a good
# reference: <https://github.com/EmbarkStudios/rust-ecosystem/blob/6783ae1573d62f3f5439b8ff9e04bec191ec2eaf/lints.toml>.
[lints.clippy]
debug_assert_with_mut_call = "deny"
inefficient_to_string = "deny"
map_flatten = "deny"
manual_ok_or = "deny"
doc_link_with_quotes = "deny"
match_same_arms = "deny"
semicolon_if_nothing_returned = "deny"
float_arithmetic = "deny"              # Can cause subtle bugs due to different behavior between native and zkVM execution.


[dependencies]
anyhow = { version = "1.0.86" }
arbitrary = { version = "1.3.2", features = ["derive"], optional = true }
bincode = "1.3.3"
borsh = { version = "1", features = ["derive"] }
bytemuck = "1.17.0"
digest = { version = "0.10.7", default-features = false, features = ["alloc"] }
# Corresponding release: <https://github.com/risc0/curve25519-dalek/releases/tag/curve25519-4.1.2-risczero.0>
ed25519-dalek = { git = "https://github.com/risc0/curve25519-dalek", rev = "3dccc5b71b806f500e73829e2a5cbfe288cce2a0", features = [
    "serde",
] }
hex = { version = "0.4.3" }
proptest = { version = "1.5", default-features = false, features = ["alloc", "std"], optional = true }
rand = { version = "0.8", optional = true }
risc0-zkvm = { version = "1.2", default-features = false, features = ["std"] }
risc0-zkvm-platform = "1.2"
schemars = { version = "0.8.21", features = ["derive"] }
serde = { version = "1.0.208", default-features = false, features = [
    "alloc",
    "derive",
] }

sha2 = { version = "0.10.8" }
thiserror = "1.0.64"

sov-rollup-interface = { path = "../../rollup-interface" }
sov-cycle-utils = { git = "https://github.com/Sovereign-Labs/risc0-cycle-macros.git", rev = "7c3995c0a517465f28f915e9da22f54960198503", features = ["risc0"], optional = true }
sov-metrics = { path = "../../full-node/sov-metrics", optional = true }


[dev-dependencies]
jsonschema = "0.26.1"
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

[build-dependencies]
anyhow = { version = "1.0.86" }

[features]
default = []
native = [
    "ed25519-dalek/default",
    "ed25519-dalek/rand_core",
    "rand",
    "sov-cycle-utils?/native",
    "risc0-zkvm/prove",
    "sov-rollup-interface/native",
    "sov-metrics",
]
bench = ["sov-cycle-utils"]
arbitrary = ["dep:arbitrary", "dep:proptest", "sov-rollup-interface/arbitrary"]
bincode = []

[[test]]
name = "native"
required-features = ["native"]
