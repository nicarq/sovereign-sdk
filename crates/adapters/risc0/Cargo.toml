[package]
name = "sov-risc0-adapter"
authors = { workspace = true }
description = "An adapter allowing Risc0 to be used with the Sovereign SDK"
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
version = { workspace = true }
readme = "README.md"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
bincode = { workspace = true }
borsh = { workspace = true }
digest = { workspace = true }
risc0-zkvm = { workspace = true, default-features = false, features = ["std"] }
risc0-zkvm-platform = { workspace = true }
serde = { workspace = true }
bytemuck = "1.17.0"
sov-cycle-utils = { workspace = true, features = ["risc0"], optional = true }
sov-rollup-interface = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true, optional = true }

sha2 = { version = "0.10.8" }
sov-metrics = { workspace = true, optional = true }

# Corresponding release: <https://github.com/risc0/curve25519-dalek/releases/tag/curve25519-4.1.2-risczero.0>
ed25519-dalek = { git = "https://github.com/risc0/curve25519-dalek", rev = "3dccc5b71b806f500e73829e2a5cbfe288cce2a0", features = [
    "serde",
] }

arbitrary = { workspace = true, optional = true }
proptest = { workspace = true, features = ["std"], optional = true }

[dev-dependencies]
jsonschema = { workspace = true }
serde_json = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }

[features]
default = []
native = [
    "ed25519-dalek/default",
    "ed25519-dalek/rand_core",
    "rand",
    "sov-cycle-utils?/native",
    "risc0-zkvm/prove",
    "sov-rollup-interface/native",
    "sov-metrics",
]
bench = ["sov-cycle-utils"]
arbitrary = ["dep:arbitrary", "dep:proptest", "sov-rollup-interface/arbitrary"]
bincode = []

[[test]]
name = "native"
required-features = ["native"]
