[package]
name = "sov-sp1-adapter"
description = "An adapter allowing SP1 to be used with the Sovereign SDK"
version = "0.3.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Sovereign Labs <info@sovereign.xyz>"]
homepage = "https://www.sovereign.xyz"
repository = "https://github.com/sovereign-labs/sovereign-sdk"
readme = "README.md"

[lints.rust]
dead_code = "deny"
non_ascii_idents = "deny" # Bad for readability and it can also be a security vulnerability
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(coverage)'] }

# In case you need inspiration for new lints to add to the list, this is a good
# reference: <https://github.com/EmbarkStudios/rust-ecosystem/blob/6783ae1573d62f3f5439b8ff9e04bec191ec2eaf/lints.toml>.
[lints.clippy]
debug_assert_with_mut_call = "deny"
inefficient_to_string = "deny"
map_flatten = "deny"
manual_ok_or = "deny"
doc_link_with_quotes = "deny"
match_same_arms = "deny"
semicolon_if_nothing_returned = "deny"
float_arithmetic = "deny"              # Can cause subtle bugs due to different behavior between native and zkVM execution.

[dependencies]
anyhow = { version = "1.0.95" }
arbitrary = { version = "1.3.2", features = ["derive"], optional = true }
bincode = "1.3.3"
borsh = { version = "1", features = ["derive"] }
digest = { version = "0.10.7", default-features = false, features = ["alloc"] }
ed25519-consensus = { version = "=2.1.0" }
hex = { version = "0.4.3" }
proptest = { version = "1.5", default-features = false, features = ["alloc", "std"], optional = true }
rand = { version = "0.8", optional = true }
schemars = { version = "0.8.21", features = ["derive"] }
serde = { version = "1.0.208", default-features = false, features = [
    "alloc",
    "derive",
] }
sha2 = { version = "0.10.8" }
sp1-lib = { version = "3.0.0" }

sov-rollup-interface = { path = "../../rollup-interface" }
sov-metrics = { path = "../../full-node/sov-metrics", features = ["sp1"], optional = true }

[target.'cfg(not(target_os = "zkvm"))'.dependencies]
sp1-sdk = { version = "3.0.0", default-features = false }

[target.'cfg(all(target_os = "zkvm", target_vendor = "succinct"))'.dependencies]
sp1-zkvm = { version = "3.0.0" }

[dev-dependencies]
reltester = { git = "https://github.com/sovereign-labs/reltester.git", rev = "d6209abff72929f5ba41614f5cea3e4a748428c3" }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }
sov-sp1-adapter = { path = ".", features = ["arbitrary", "native"] }
sov-test-utils = { path = "../../module-system/sov-test-utils", features = ["arbitrary"] }

[build-dependencies]
anyhow = { version = "1.0.95" }

[features]
default = []
native = [
    "rand",
    "sov-rollup-interface/native",
    "sov-metrics?/native",
    "sov-sp1-adapter/native",
]
bench = [
    "sov-metrics/sp1",
    "sov-sp1-adapter/bench"
]
arbitrary = [
    "dep:arbitrary",
    "dep:proptest",
    "sov-rollup-interface/arbitrary",
    "sov-sp1-adapter/arbitrary",
    "sov-test-utils/arbitrary"
]
