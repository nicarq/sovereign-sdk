[package]
name = "sov-sp1-adapter"
authors = { workspace = true }
description = "An adapter allowing SP1 to be used with the Sovereign SDK"
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
version = { workspace = true }
readme = "README.md"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
bincode = { workspace = true }
borsh = { workspace = true }
digest = { workspace = true }
serde = { workspace = true }
bytemuck = "1.15.0"
sov-cycle-utils = { workspace = true, optional = true }
sov-rollup-interface = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true, optional = true }

sp1-lib = { workspace = true }

sha2 = { workspace = true }
ed25519-consensus = { git = "https://github.com/sp1-patches/ed25519-consensus", branch = "patch-v2.1.0" }

arbitrary = { workspace = true, optional = true }
cfg-if = "1.0.0"

[target.'cfg(not(target_os = "zkvm"))'.dependencies]
sp1-sdk = { workspace = true, default-features = false }

[target.'cfg(all(target_os = "zkvm", target_vendor = "succinct"))'.dependencies]
sp1-zkvm = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }

[features]
default = []
native = [
	"rand",
	"sov-rollup-interface/native",
	"sov-cycle-utils?/native"
]
bench = ["sov-cycle-utils/sp1"]
arbitrary = ["dep:arbitrary", "sov-rollup-interface/arbitrary"]

[[test]]
name = "native"
required-features = ["native"]
