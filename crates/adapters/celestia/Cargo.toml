[package]
name = "sov-celestia-adapter"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
publish = true
description = "Celestia DA adapter for Sovereign SDK rollups"
homepage = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
borsh = { workspace = true, features = ["bytes"] }
bech32 = { workspace = true }
prost = "0.13"

celestia-proto = { version = "0.6.0" }
celestia-rpc = { version = "0.8.0", default-features = false, optional = true }
celestia-types = { version = "0.9.0", default-features = false }
tendermint = { version = "0.40.0", default-features = false }
tendermint-proto = { version = "0.40.0" }
nmt-rs = { workspace = true }

# Convenience
async-trait = { workspace = true }
anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
proptest = { workspace = true, features = ["std"], optional = true }
derive_more = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true, features = ["serde"] }
jsonrpsee = { workspace = true, features = ["http-client"], optional = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, optional = true, features = ["sync"] }
futures = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
sov-cycle-utils = { workspace = true, optional = true }
sov-rollup-interface = { workspace = true }
tower = { workspace = true, optional = true }

[dev-dependencies]
postcard = { version = "1", features = ["use-std"] }
reltester = { workspace = true }
sov-celestia-adapter = { path = ".", features = ["native", "arbitrary"] }
sov-test-utils = { workspace = true, features = ["arbitrary"] }
wiremock = "0.6"
test-strategy = { workspace = true }
tokio = { workspace = true, features = [
    "test-util",
    "macros",
    "rt-multi-thread",
] }
# For serialization testing
risc0-zkvm = { workspace = true, default-features = false, features = ["std"] }
risc0-zkvm-platform = { workspace = true }

[features]
default = []
native = [
    "tendermint/default",
    "dep:celestia-rpc",
    "dep:futures",
    "dep:jsonrpsee",
    "dep:tokio",
    "sov-celestia-adapter/native",
    "sov-rollup-interface/native",
    "sov-cycle-utils?/native",
    "dep:tower",
]
bench = [
    "dep:sov-cycle-utils",
    "sov-celestia-adapter/bench",
]
arbitrary = [
    "dep:arbitrary",
    "dep:proptest",
    "sov-celestia-adapter/arbitrary",
    "sov-rollup-interface/arbitrary",
    "sov-test-utils/arbitrary"
]
