[package]
name = "sov-celestia-adapter"
description = "Celestia DA adapter for Sovereign SDK rollups"
version = "0.3.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
publish = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lints]
workspace = true

[dependencies]
borsh = { version = "1", features = ["derive", "bytes"] }
bech32 = { version = "0.11" }
prost = "0.13"

celestia-proto = { git = "https://github.com/eigerco/lumina.git", rev = "7fb26b824c97b4d15b61891a251a6d677087b9fc" }
celestia-rpc = { git = "https://github.com/eigerco/lumina.git", rev = "7fb26b824c97b4d15b61891a251a6d677087b9fc", default-features = false, optional = true }
celestia-types = { git = "https://github.com/eigerco/lumina.git", rev = "7fb26b824c97b4d15b61891a251a6d677087b9fc", default-features = false }
tendermint = { version = "0.40.0", default-features = false }
tendermint-proto = { version = "0.40.0" }
nmt-rs = { version = "0.2.3", features = ["serde", "borsh"] }

# Convenience
anyhow = { version = "1.0.95" }
arbitrary = { version = "1.3.2", features = ["derive"], optional = true }
async-trait = "0.1.81"
backon = { version = "0.4.4", optional = true }
derive_more = { version = "1.0", default-features = false, features = ["std"] }
futures = { version = "0.3", default-features = false, optional = true }
hex = { version = "0.4.3", features = ["serde"] }
jsonrpsee = { version = "0.24", features = ["http-client"], optional = true }
proptest = { version = "1.5", default-features = false, features = ["alloc", "std"], optional = true }
schemars = { version = "0.8.21", features = ["derive"] }
serde = { version = "1.0.208", default-features = false, features = [
    "alloc",
    "derive",
] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }
sha2 = { version = "0.10.8", default-features = false }

thiserror = { workspace = true }
tokio = { version = "1.42", default-features = false, optional = true, features = ["sync"] }
tower = { version = "0.4", default-features = false, optional = true }
tracing = { version = "0.1.40", default-features = false }

sov-metrics = { workspace = true, optional = true }
sov-modules-macros = { workspace = true, optional = true }
sov-rollup-interface = { workspace = true }

[dev-dependencies]
postcard = { version = "1", features = ["use-std"] }
reltester = { workspace = true }
sov-celestia-adapter = { path = ".", features = ["native", "arbitrary"] }
sov-test-utils = { workspace = true, features = ["arbitrary"] }
wiremock = "0.6"
test-strategy = "0.4.0"
tokio = { version = "1.42", default-features = false, features = [
    "test-util",
    "macros",
    "rt-multi-thread",
] }
# For serialization testing
risc0-zkvm = { version = "1.2", default-features = false, features = ["std"] }
risc0-zkvm-platform = { version = "1.2" }
bincode = { version = "1.3.3" }

[features]
default = []
native = [
    "backon",
    "tendermint/default",
    "dep:celestia-rpc",
    "dep:futures",
    "dep:jsonrpsee",
    "dep:tokio",
    "sov-celestia-adapter/native",
    "sov-rollup-interface/native",
    "sov-metrics?/native",
    "dep:tower",
    "sov-modules-macros?/native"
]
bench = [
    "dep:sov-metrics",
    "sov-modules-macros/bench",
    "sov-celestia-adapter/bench",
]
arbitrary = [
    "dep:arbitrary",
    "dep:proptest",
    "sov-celestia-adapter/arbitrary",
    "sov-rollup-interface/arbitrary",
    "sov-test-utils/arbitrary"
]
