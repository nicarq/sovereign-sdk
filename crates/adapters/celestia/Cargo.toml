[package]
name = "sov-celestia-adapter"
version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
publish = true
description = "Celestia DA adapter for Sovereign SDK rollups"
homepage = { workspace = true }
repository = { workspace = true }

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
borsh = { workspace = true, features = ["bytes"] }
bech32 = { workspace = true }
prost = "0.12"

#celestia-proto = { version = "0.2.0" }
#celestia-rpc = { version = "0.2.0", default-features = false, optional = true }
#celestia-types = { version = "0.2.0", default-features = false }
# Pre 0.3.0 commit
celestia-proto = { git = "https://github.com/eigerco/lumina.git", rev = "1579079cc480982f956c47ab664489d2d2d121b7" }
celestia-rpc = { git = "https://github.com/eigerco/lumina.git", rev = "1579079cc480982f956c47ab664489d2d2d121b7", default-features = false, optional = true }
celestia-types = { git = "https://github.com/eigerco/lumina.git", rev = "1579079cc480982f956c47ab664489d2d2d121b7", default-features = false }
celestia-tendermint = { version = "0.32.1", default-features = false }
celestia-tendermint-proto = { version = "0.32.1" }
nmt-rs = { version = "0.2.2", features = ["serde", "borsh"] }

# Convenience
async-trait = { workspace = true }
anyhow = { workspace = true }
derive_more = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true, features = ["serde"] }
jsonrpsee = { workspace = true, features = ["http-client"], optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
tokio = { workspace = true, optional = true, features = ["sync"] }
futures = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
sov-cycle-utils = { workspace = true, optional = true }
risc0-zkvm = { workspace = true, default-features = false, features = [
    "std",
], optional = true }
risc0-zkvm-platform = { workspace = true, optional = true }
sov-rollup-interface = { workspace = true }

[dev-dependencies]
postcard = { version = "1", features = ["use-std"] }
proptest = { workspace = true, features = ["std"] }
sov-celestia-adapter = { path = ".", features = ["native"] }
wiremock = "0.5"
tokio = { workspace = true, features = ["test-util", "macros"] }
# For serialization testing
risc0-zkvm = { workspace = true, default-features = false, features = ["std"] }
risc0-zkvm-platform = { workspace = true }

[features]
default = []
native = [
    "celestia-tendermint/default",
    "dep:celestia-rpc",
    "dep:futures",
    "dep:jsonrpsee",
    "dep:serde_json",
    "dep:tokio",
    "sov-celestia-adapter/native",
    "sov-rollup-interface/native",
    "sov-cycle-utils?/native"
]
risc0 = [
    "sov-celestia-adapter/risc0",
    "sov-cycle-utils?/risc0"
]
bench = [
    "dep:sov-cycle-utils",
    "dep:risc0-zkvm",
    "dep:risc0-zkvm-platform",
    "sov-celestia-adapter/bench",
    "sov-celestia-adapter/risc0",
]
