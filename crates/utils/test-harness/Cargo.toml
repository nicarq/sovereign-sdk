[package]
name = "sov-test-harness"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
publish = false
resolver = "2"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true, features = [
	"constructor",
	"deref_mut",
	"add",
	"mul",
] }
borsh = { workspace = true }
clap = { workspace = true }
derive-getters = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { version = "0.26", features = ["derive"] }
thiserror = { workspace = true }
toml = { workspace = true }
tokio = { workspace = true, features = ["signal"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }

sov-celestia-adapter = { workspace = true, features = ["native", "arbitrary"] }
sov-bank = { workspace = true, features = ["native", "arbitrary"] }
sov-cli = { workspace = true }
sov-ledger-json-client = { workspace = true }
sov-mock-zkvm = { workspace = true, features = ["native", "arbitrary"] }
sov-mock-da = { workspace = true, features = ["native", "arbitrary"] }
sov-modules-api = { workspace = true, features = ["native", "arbitrary"] }
sov-modules-macros = { workspace = true }
sov-modules-stf-blueprint = { workspace = true, features = ["native"] }
sov-prover-incentives = { workspace = true }
# Right now, these dependencies are needed to fix cargo's feature unification.
# They will be fixed in a future update
sov-risc0-adapter = { workspace = true, features = ["native", "arbitrary"] }
sov-sp1-adapter = { workspace = true, features = ["native", "arbitrary"] }
sov-rollup-interface = { workspace = true, features = ["native", "arbitrary"] }

[dev-dependencies]
arbitrary = { workspace = true }
