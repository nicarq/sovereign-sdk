[package]
name = "sov-transaction-generator"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
publish.workspace = true
repository.workspace = true
resolver = "2"

[dependencies]
sov-bank = { workspace = true, features = ["native", "arbitrary"] }
sov-modules-api = { workspace = true, features = ["native", "arbitrary"] }
sov-modules-stf-blueprint = { workspace = true, features = ["native"] }
sov-node-client = { workspace = true }

anyhow = { workspace = true }
derivative = { workspace = true }
derive_more = { workspace = true, features = [
	"constructor",
	"deref_mut",
	"add",
	"mul",
] }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
indexmap = "2"

[dev-dependencies]
sov-transaction-generator = { path = ".", features = ["native"] }
sov-kernels = { workspace = true, features = ["native"] }
sov-mock-da = { workspace = true, features = ["native", "arbitrary"] }
sov-mock-zkvm = { workspace = true, features = ["native", "arbitrary"] }
sov-paymaster = { workspace = true, features = ["native"] }
sov-state = { workspace = true, features = ["native"] }
sov-test-utils = { workspace = true, features = ["native"] }

borsh = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
serde = { workspace = true }

[lints]
workspace = true

[features]
# We need a native feature because macros in sov-test-utils rely on it. This 
# crate is native only even without the native feature enabled.
default = ["native"]
native = [
	"sov-bank/native",
	"sov-kernels/native",
	"sov-mock-da/native",
	"sov-mock-zkvm/native",
	"sov-modules-api/native",
	"sov-modules-stf-blueprint/native",
	"sov-paymaster/native",
	"sov-state/native",
	"sov-test-utils/native",
]
