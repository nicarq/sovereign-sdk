[package]
name = "sov-evm"
description = "A Sovereign SDK managing fungible tokens"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
publish = false

[lints]
workspace = true

[dependencies]
sov-modules-api = { workspace = true, features = ["evm"] }
sov-rollup-interface = { workspace = true }
sov-kernels = { workspace = true }
sov-state = { workspace = true }
sov-address = { workspace = true, features = ["evm"] }
sov-bank = { workspace = true }
sov-uniqueness = { workspace = true }

anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
thiserror = { workspace = true }
bytes = { workspace = true }
derive_more = { workspace = true }
serde = { workspace = true }
serde_with = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
derive-new = { workspace = true }
itertools = { workspace = true }
hex = { workspace = true }
jsonrpsee = { workspace = true, features = [
	"macros",
	"client-core",
	"server",
], optional = true }
schemars = { workspace = true }
tracing = { workspace = true }

alloy-sol-types = { workspace = true, default-features = false }
alloy-eips = { workspace = true, features = ["std"] }
# `rlp` feature implicitly enabled via `reth-` crates, but this allows us to explicitly access Error type from there
alloy-primitives = { workspace = true, default-features = false, features = [
	"rlp",
] }
alloy-consensus = { workspace = true, features = [
	"serde",
	"serde-bincode-compat",
] }

alloy-rpc-types = { workspace = true, optional = true }
digest = { workspace = true }
sha2 = { workspace = true }
revm = { workspace = true, features = [
	"optional_block_gas_limit",
	"optional_eip3607",
	"optional_no_base_fee",
	"optional_balance_check",
	"std",
] }
reth-revm = { workspace = true }
reth-ethereum-primitives = { workspace = true, features = [
	"serde",
	"serde-bincode-compat",
] }
reth-primitives = { workspace = true }
reth-primitives-traits = { workspace = true }
revm-inspector = { workspace = true, default-features = false, optional = true }
revm-inspectors = { workspace = true, default-features = false, optional = true }
reth-rpc-convert = { workspace = true }
reth-rpc-eth-types = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
proptest = { workspace = true, optional = true }

[dev-dependencies]
sov-evm = { path = ".", features = ["native"] }
strum = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }
tempfile = { workspace = true }
bytes = { workspace = true }
ethers-signers = { workspace = true }
ethers-core = { workspace = true }
secp256k1 = { workspace = true, features = ["rand"] }
lazy_static = "1.5.0"
jsonschema = { workspace = true }
bincode = { workspace = true }

sov-mock-da = { workspace = true, features = ["native"] }
sov-test-utils = { workspace = true }
sov-eth-dev-signer = { workspace = true }
sov-modules-api = { workspace = true, features = ["test-utils"] }

[features]
arbitrary = [
	"dep:arbitrary",
	"dep:rand",
	"dep:proptest",
	"alloy-eips/arbitrary",
	"alloy-primitives/arbitrary",
	"alloy-rpc-types?/arbitrary",
	"alloy-sol-types/arbitrary",
	"reth-primitives/arbitrary",
	"revm/arbitrary",
	"sov-address/arbitrary",
	"sov-evm/arbitrary",
	"sov-mock-da/arbitrary",
	"sov-modules-api/arbitrary",
	"sov-rollup-interface/arbitrary",
	"sov-state/arbitrary",
	"sov-test-utils/arbitrary",
	"sov-bank/arbitrary",
	"sov-uniqueness/arbitrary",
	"alloy-consensus/arbitrary",
	"reth-primitives-traits/arbitrary",
	"reth-ethereum-primitives/arbitrary",
]
native = [
	"alloy-rpc-types",
	"jsonrpsee",
	"dep:rand",
	"revm-inspector",
	"revm-inspectors",
	"alloy-primitives/std",
	"reth-primitives/std",
	"reth-ethereum-primitives/std",
	"dep:reth-rpc-eth-types",
	# Optional for speed up in native mode
	# "revm/asm-keccak"
	"sov-evm/native",
	"sov-address/native",
	"sov-mock-da/native",
	"sov-modules-api/native",
	"sov-state/native",
	"sov-rollup-interface/native",
	"sov-kernels/native",
	"sov-bank/native",
	"sov-uniqueness/native",
]
