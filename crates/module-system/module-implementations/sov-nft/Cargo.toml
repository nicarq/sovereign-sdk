[package]
name = "sov-nft"
description = "A Sovereign SDK module for managing non-fungible tokens"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
serde = { workspace = true }
schemars = { workspace = true }

sov-modules-api = { workspace = true }
sov-state = { workspace = true }

postgres = { version = "0.19.8", optional = true }
tokio = { workspace = true, features = ["rt-multi-thread"], optional = true }
tracing = { workspace = true, optional = true }

[dev-dependencies]
sov-nft = { version = "*", features = ["native"], path = "." }
tempfile = { workspace = true }
strum = { workspace = true }
sov-test-utils = { workspace = true }

[features]
default = []
offchain = ["postgres", "sov-nft/offchain", "tokio", "tracing"]
native = ["sov-modules-api/native", "sov-nft/native", "sov-state/native"]
