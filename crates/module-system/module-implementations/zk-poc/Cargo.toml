[package]
name = "zk-poc"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arbitrary = { workspace = true, optional = true }
borsh = { workspace = true, features = ["rc"] }
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
schemars = { workspace = true }
serde = { workspace = true }
bincode = { workspace = true }

sov-bank = { workspace = true }
sov-modules-api = { workspace = true }
sov-risc0-adapter = { workspace = true, optional = true }
sov-rollup-interface = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
strum = { workspace = true }
zk-poc = { path = ".", version = "*", features = ["native"] }
sov-test-utils = { workspace = true }
sov-state = { workspace = true, features = ["native"] }
zk-poc-risc0-methods = { path = "./risc0-methods" }

[features]
default = ["verify-risc0"]
arbitrary = [
	"dep:arbitrary",
	"dep:proptest",
	"dep:proptest-derive",
	"zk-poc/arbitrary",
	"sov-modules-api/arbitrary",
	"sov-state/arbitrary",
	"sov-test-utils/arbitrary",
	"sov-bank/arbitrary",
]
native = [
	"zk-poc/native",
	"sov-bank/native",
	"sov-modules-api/native",
	"sov-state/native",
]
verify-risc0 = [
    "dep:sov-risc0-adapter",
    "dep:sov-rollup-interface",
    "sov-risc0-adapter/native",
]
