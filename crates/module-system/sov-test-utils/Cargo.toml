[package]
name = "sov-test-utils"
description = "A set of utils for testing the Sovereign SDK"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
resolver = "2"
publish = false

[lints]
workspace = true

[dependencies]
derivative = { workspace = true }
derive_more = { workspace = true }
anyhow = { workspace = true }
axum-server = { workspace = true }
borsh = { workspace = true }
jsonschema = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
serde = { workspace = true }
schemars = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }

ethereum-types = { workspace = true }
ethers-core = { workspace = true }
ethers-contract = { workspace = true }


sha2 = { workspace = true }
sov-rollup-interface = { workspace = true }
sov-modules-api = { workspace = true, features = ["native", "test-utils"] }
sov-modules-stf-blueprint = { workspace = true, features = [
	"native",
	"test-utils",
] }
sov-stf-runner = { workspace = true }
sov-value-setter = { workspace = true, features = ["native"] }
sov-attester-incentives = { workspace = true, features = ["native"] }
sov-paymaster = { workspace = true, features = ["native"] }
sov-prover-incentives = { workspace = true, features = ["native"] }
sov-modules-rollup-blueprint = { workspace = true, features = ["native"] }
sov-bank = { workspace = true, features = ["native", "test-utils"] }
sov-accounts = { workspace = true, features = ["native"] }
sov-nonces = { workspace = true, features = ["native"] }
sov-kernels = { workspace = true, features = ["native"] }
sov-ledger-apis = { workspace = true }
sov-api-spec = { workspace = true }
sov-capabilities = { workspace = true, features = ["native"] }
sov-sequencer = { workspace = true }
sov-sequencer-registry = { workspace = true, features = ["native"] }
sov-chain-state = { workspace = true, features = ["native", "test-utils"] }
sov-blob-storage = { workspace = true, features = ["native"] }
sov-db = { workspace = true }
sov-state = { workspace = true }
sov-mock-da = { workspace = true, features = ["native"] }
sov-mock-zkvm = { workspace = true, features = ["native"] }
strum = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
rockbound = { workspace = true }
reqwest = { workspace = true, features = ["json"] }

[dev-dependencies]
proptest = { workspace = true }
sov-test-utils = { path = ".", features = ["arbitrary", "native"] }


[features]
default = ["native"]
arbitrary = [
	"ethereum-types/arbitrary",
	"sov-db/arbitrary",
	"sov-mock-zkvm/arbitrary",
	"sov-modules-api/arbitrary",
	"sov-rollup-interface/arbitrary",
	"sov-sequencer-registry/arbitrary",
	"sov-state/arbitrary",
	"rockbound/arbitrary",
	"sov-accounts/arbitrary",
	"sov-nonces/arbitrary",
	"sov-mock-da/arbitrary",
	"sov-bank/arbitrary",
	"sov-test-utils/arbitrary",
	"sov-paymaster/arbitrary",
]
native = [
	"sov-accounts/native",
	"sov-api-spec/native",
	"sov-attester-incentives/native",
	"sov-bank/native",
	"sov-blob-storage/native",
	"sov-capabilities/native",
	"sov-chain-state/native",
	"sov-kernels/native",
	"sov-mock-da/native",
	"sov-mock-zkvm/native",
	"sov-modules-api/native",
	"sov-modules-rollup-blueprint/native",
	"sov-modules-stf-blueprint/native",
	"sov-nonces/native",
	"sov-paymaster/native",
	"sov-prover-incentives/native",
	"sov-rollup-interface/native",
	"sov-sequencer-registry/native",
	"sov-state/native",
	"sov-test-utils/native",
	"sov-value-setter/native"
]
