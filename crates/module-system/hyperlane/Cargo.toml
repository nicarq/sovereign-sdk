[package]
name = "sov-hyperlane-integration"
description = "A Sovereign SDK module implementing a Hyperlane Mailbox"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
publish = false

[lints]
workspace = true

[dev-dependencies]
sov-address = { workspace = true }
tempfile = { workspace = true }
strum = { workspace = true }
sov-value-setter = { workspace = true, features = ["native"] }
sov-modules-api = { workspace = true, features = ["native"] }
sov-test-utils = { workspace = true }
sov-state = { workspace = true, features = ["native"] }
hex = { workspace = true }
sov-hyperlane-integration = { path = ".", features = ["test-utils"] }
workspace-hack = { workspace = true }                                 # required for feature unification with arbitrary

[dependencies]
proptest-derive = { workspace = true, optional = true }
proptest = { workspace = true, optional = true }
arbitrary = { workspace = true, optional = true }
anyhow = { workspace = true }
sov-bank = { workspace = true }
strum = { workspace = true }
sov-modules-api = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
borsh = { workspace = true, features = ["rc"] }
secp256k1 = { workspace = true }
sha3 = { workspace = true }

[features]
default = []
test-utils = ["arbitrary"]
arbitrary = [
	"dep:proptest-derive",
	"dep:arbitrary",
	"dep:proptest",
	"sov-address/arbitrary",
	"sov-bank/arbitrary",
	"sov-hyperlane-integration/arbitrary",
	"sov-modules-api/arbitrary",
	"sov-state/arbitrary",
	"sov-test-utils/arbitrary",
]
native = [
	"sov-modules-api/native",
	"sov-value-setter/native",
	"sov-state/native",
	"sov-address/native",
	"sov-bank/native",
	"sov-hyperlane-integration/native",
]
