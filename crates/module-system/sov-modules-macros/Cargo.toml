[package]
name = "sov-modules-macros"
description = "Macros for use with the Sovereign SDK module system"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
repository = { workspace = true }

version = { workspace = true }
readme = "README.md"
resolver = "2"
autotests = false

[lints]
workspace = true

[lib]
proc-macro = true

[[test]]
name = "tests"
path = "tests/integration/main.rs"

[dependencies]
anyhow = { workspace = true }
bech32 = { workspace = true }
blake2 = "0.10"
convert_case = "0.6.0"
darling = "0.20"
derive_more = { workspace = true, features = ["deref"] }
hex = { workspace = true }
prettier-please = { version = "0.3", default-features = false }
proc-macro2 = "1.0"
quote = "1.0"
serde = { workspace = true }
syn = { version = "2.0", features = ["full"] }
toml = { workspace = true }
sov-wallet-format-macro-helpers = { git = "ssh://git@github.com/Sovereign-Labs/sov-wallet-format.git", rev = "0860de2877084066477d0157a0f5a311bd1be919" }

[dev-dependencies]
borsh = { workspace = true }
jsonrpsee = { workspace = true, features = ["http-client", "macros", "server"] }
schemars = { workspace = true }
serde = { workspace = true }
tempfile = { workspace = true }
trybuild = "1.0"

sov-modules-api = { workspace = true }
sov-rollup-interface = { workspace = true }
sov-state = { workspace = true }
sov-bank = { workspace = true, features = ["native"] }
sov-modules-macros = { workspace = true, features = ["native"] }
sov-test-utils = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }

[features]
default = []
native = [
    "sov-bank/native",
    "sov-modules-api/native",
    "sov-modules-macros/native",
    "sov-rollup-interface/native",
    "sov-state/native",
]
