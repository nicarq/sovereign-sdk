openapi: "3.0.2"
info:
  title: Sovereign SDK Runtime API
  version: 0.1.0
  description: |
    This is the JSON API for the Sovereign SDK runtimes and modules.
  contact:
    name: Sovereign Labs
    url: https://github.com/Sovereign-Labs/sovereign-sdk-wip
    email: info@sovereign.xyz
servers:
  - url: http://localhost:12346/modules
    description: Modules
paths:
  /:
    get:
      summary: Get the list of modules
      operationId: get_modules
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      modules:
                        $ref: '#/components/schemas/Modules'
  /{moduleName}:
    get:
      summary: Get module information by name
      operationId: get_module
      parameters:
        - name: moduleName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Module"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    rollup_height:
      name: rollup_height
      in: query
      description: The height of the rollup to query. If not provided, the rollup head is used.
      required: false
      schema:
        type: integer
        minimum: 0
  responses:
    StateMapResponse:
      description: Contains meta information about `StateMap`, such as its prefix, type and description
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/StateValueBase"
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - data
    StateMapElementResponse:
      description: Response containing the value of a `StateMap` element.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  key:
                    $ref: "#/components/schemas/AnyJsonValue"
                  value:
                    $ref: "#/components/schemas/AnyJsonValue"
                required:
                  - key
                  - value
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - data
    StateVecResponse:
      description: Response containing meta information about vector
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  length:
                    type: integer
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - data
    StateVecElementResponse:
      description: Response containing the value of a `StateVec` element.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  index:
                    type: integer
                  value:
                    $ref: "#/components/schemas/AnyJsonValue"
                required:
                  - index
                  - value
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - data
    StateValueResponse:
      description: Response containing the `StateValue`.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/AnyJsonValue"
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - data
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: "#/components/schemas/Error"
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
            required:
              - errors
    BadRequestResponse:
      description: The request has invalid parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: "#/components/schemas/Error"
              meta:
                $ref: "#/components/schemas/AnyJsonValue"
  schemas:
    AnyJsonValue:
      description: "Any JSON type, including null."
      nullable: true
      oneOf:
        - type: string
          title: "String"
        - type: number
          title: "Number"
        - type: boolean
          title: "Boolean"
        - type: array
          title: "Array"
          items:
            x-stainless-any: true
        - type: object
          title: "Object"
          additionalProperties: true
    Module:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ModuleId"
        name:
          type: string
          description: The name of the module.
        description:
          type: string
          description: A short description of the module.
        prefix:
          $ref: "#/components/schemas/Prefix"
        state_items:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/StateValueBase"
    StateValueBase:
      type: object
      properties:
        prefix:
          $ref: "#/components/schemas/Prefix"
        type:
          type: string
          description: The type of the state value.
        description:
          type: string
          description: A short description of the state value.
        namespace:
          $ref: "#/components/schemas/Namespace"
    StateValue:
      type: object
      properties:
        name:
          type: string
          description: Name of the value.
      additionalProperties:
        $ref: "#/components/schemas/StateValueBase"
    Namespace:
      type: string
      description: The namespace of the state value.
      enum:
        - user
        - kernel
        - accessory
    Prefix:
      type: string
      description: The prefix of the module.
      pattern: "^0x[a-fA-F0-9]+$"
      example: "0x1234567890abcdef"
    ModuleId:
      type: string
      pattern: "^module_1[02-9ac-hj-np-z]+$"
      example: "module_1r5glamudyy9ysysfjkwu3wf9cjqs98e47tzc6pxuqlp48phqk36sh0zjpk"
      description: The ID of a module, bech32 encoded with `module_` prefix.
    Modules:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ModuleOverviewFromRuntime'
    ModuleOverviewFromRuntime:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ModuleId"
      required:
        - id
    Error:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code related to this error
        title:
          type: string
        details:
          $ref: "#/components/schemas/AnyJsonValue"
      required:
        - status
        - title
        - details

