openapi: 3.0.2
info:
  title: Sovereign Full Node API
  version: 0.1.0
  description: |-
    This is the REST API for the Sovereign SDK full node.
  contact:
    name: Sovereign Labs
    url: https://github.com/Sovereign-Labs/sovereign-sdk-wip
    email: info@sovereign.xyz
servers:
  - url: http://localhost:12346
    description: Localhost
tags:
  - name: Ledger
    x-displayName: Ledger
  - name: Sequencer
    x-displayName: Sequencer
  - name: Rollup
    x-displayName: Rollup
paths:
  /ledger/slots/latest:
    get:
      tags:
        - Ledger
      summary: Get the latest slot.
      operationId: get_latest_slot
      parameters:
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Slot"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/slots/{slotId}:
    get:
      tags:
        - Ledger
      summary: Get a slot by ID.
      operationId: get_slot_by_id
      parameters:
        - $ref: "#/components/parameters/Ledger_slotId"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Slot"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/slots/{slotId}/events:
    get:
      tags:
        - Ledger
      summary: Get all the events for a slot, optionally filtered by key prefix.
      operationId: get_slot_filtered_events
      parameters:
        - $ref: "#/components/parameters/Ledger_slotId"
        - name: prefix
          in: query
          description: The key prefix to filter by.
          required: false
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Events"
  /ledger/slots/{slotId}/batches/{batchOffset}:
    get:
      tags:
        - Ledger
      summary: Get a batch by slot ID and batch offset.
      operationId: get_batch_by_slot_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_slotId"
        - $ref: "#/components/parameters/Ledger_batchOffset"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Batch"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/slots/{slotId}/batches/{batchOffset}/txs/{txOffset}:
    get:
      tags:
        - Ledger
      summary: Get a transaction by slot ID, batch offset, and transaction offset.
      operationId: get_tx_by_slot_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_slotId"
        - $ref: "#/components/parameters/Ledger_batchOffset"
        - $ref: "#/components/parameters/Ledger_txOffset"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Tx"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/slots/{slotId}/batches/{batchOffset}/txs/{txOffset}/events/{eventOffset}:
    get:
      tags:
        - Ledger
      summary: >-
        Get an event by slot ID, batch offset, transaction offset, and event offset.
      operationId: get_event_by_slot_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_slotId"
        - $ref: "#/components/parameters/Ledger_batchOffset"
        - $ref: "#/components/parameters/Ledger_txOffset"
        - $ref: "#/components/parameters/Ledger_eventOffset"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Event"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/batches/{batchId}:
    get:
      tags:
        - Ledger
      summary: Get a batch by ID.
      operationId: get_batch_by_id
      parameters:
        - $ref: "#/components/parameters/Ledger_batchId"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Batch"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/batches/{batchId}/txs/{txOffset}:
    get:
      tags:
        - Ledger
      summary: Get a transaction by batch ID and transaction offset.
      operationId: get_tx_by_batch_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_batchId"
        - $ref: "#/components/parameters/Ledger_txOffset"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Tx"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/batches/{batchId}/txs/{txOffset}/events/{eventOffset}:
    get:
      tags:
        - Ledger
      summary: Get an event by batch ID, transaction offset, and event offset.
      operationId: get_event_by_batch_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_batchId"
        - $ref: "#/components/parameters/Ledger_txOffset"
        - $ref: "#/components/parameters/Ledger_eventOffset"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Event"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/txs/{txId}:
    get:
      tags:
        - Ledger
      summary: Get a transaction by ID.
      operationId: get_tx_by_id
      parameters:
        - $ref: "#/components/parameters/Ledger_txId"
        - $ref: "#/components/parameters/Ledger_children"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Tx"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/txs/{txId}/events/{eventOffset}:
    get:
      tags:
        - Ledger
      summary: Get an event by transaction ID and event offset.
      operationId: get_event_by_tx_id_and_offset
      parameters:
        - $ref: "#/components/parameters/Ledger_txId"
        - $ref: "#/components/parameters/Ledger_eventOffset"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Event"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/events/{eventId}:
    get:
      tags:
        - Ledger
      summary: Get an event by ID.
      operationId: get_event_by_id
      parameters:
        - $ref: "#/components/parameters/Ledger_eventId"
      responses:
        "200":
          $ref: "#/components/responses/Ledger_Event"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /ledger/aggregated-proofs/latest:
    get:
      tags:
        - Ledger
      summary: Get the latest aggregated proof.
      operationId: get_latest_aggregated_proof
      description: |
        Get the latest aggregated proof. You can also subscribe to the latest
        aggregated proof by using the `/aggregated-proofs/latest/ws` endpoint.
      responses:
        "200":
          $ref: "#/components/responses/AggregatedProof"
        "404":
          $ref: "#/components/responses/Ledger_NotFound"
  /sequencer/batches:
    post:
      summary: Submit a batch to the rollup
      operationId: publish_batch
      tags:
        - Sequencer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transactions:
                  type: array
                  items:
                    type: string
                    format: base64
                  minItems: 1
                  description: >-
                    The transactions to be included in the batch, encoded as Base64.
              required:
                - transactions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SubmittedBatchInfo"
                  meta:
                    type: object
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sequencer_SequencerError"
                required:
                  - meta
        "409":
          description: Can't publish batch
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                  meta:
                    type: object
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sequencer_SequencerError"
                required:
                  - meta
  /sequencer/txs:
    post:
      summary: Submit a transaction to the rollup
      description: Submit a transaction to the rollup
      operationId: acceptTx
      tags:
        - Sequencer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  format: base64
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TxInfo"
                  meta:
                    type: object
                required:
                  - data
                  - meta
  /sequencer/txs/{txHash}:
    get:
      summary: Get a transaction status by hash
      operationId: get_tx_status
      tags:
        - Sequencer
      parameters:
        - $ref: "#/components/parameters/Sequencer_txHash"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TxInfo"
                  meta:
                    type: object
                required:
                  - data
                  - meta
  /rollup/base-fee-per-gas/latest:
    get:
      summary: Retrieve the latest base fee per gas
      operationId: get_latest_base_fee_per_gas
      tags:
        - Rollup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/rollup_BaseFeePerGas"
                  meta:
                    type: object
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/rollup_Error"
                required:
                  - meta
  /rollup/addresses/{address}/dedup:
    get:
      summary: Deduplicate an address
      description: >
        This endpoint retireves deduplication information needed for building transactions.

        The exact shape of the data in the response depends on the implementation of the rollup.

      operationId: address_dedup
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
          description: The address to retrieve deduplication information about
      tags:
        - Rollup
      responses:
        "200":
          $ref: "#/components/responses/rollup_Dedup"
        "400":
          $ref: "#/components/responses/rollup_BadRequest"
  /rollup/simulate:
    post:
      summary: Simulate transaction execution
      operationId: simulate
      tags:
        - Rollup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/PartialTransaction"
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SimulateExecutionResponse"
                  meta:
                    type: object
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/rollup_Error"
                required:
                  - meta
  /rollup/sync-status:
    get:
      summary: Get the current sync status of the rollup
      operationId: get_sync_status
      tags:
        - Rollup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SyncStatus"
                  meta:
                    type: object
                required:
                  - data
                  - meta
components:
  parameters:
    Ledger_slotId:
      name: slotId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/IntOrHash"
    Ledger_batchId:
      name: batchId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/IntOrHash"
    Ledger_txId:
      name: txId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/IntOrHash"
    Ledger_eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: integer
        format: uint64
    Ledger_batchOffset:
      name: batchOffset
      in: path
      required: true
      schema:
        type: integer
        format: uint64
    Ledger_txOffset:
      name: txOffset
      in: path
      required: true
      schema:
        type: integer
        format: uint64
    Ledger_eventOffset:
      name: eventOffset
      in: path
      required: true
      schema:
        type: integer
        format: uint64
    Ledger_children:
      name: children
      in: query
      description: |
        The query mode to use when querying the ledger. If not specified, the
        default is `Compact`.
      required: false
      schema:
        type: string
        default: "0"
        enum:
          - "0"
          - "1"
    Sequencer_txHash:
      name: txHash
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Sequencer_TxHash"
  responses:
    AggregatedProof:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/AggregatedProof"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Slot:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/Slot"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Ledger_Batch:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/Ledger_Batch"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Ledger_Tx:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/Ledger_Tx"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Ledger_Event:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/Ledger_Event"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Ledger_Events:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: "#/components/schemas/Ledger_Event"
              meta:
                $ref: "#/components/schemas/Ledger_AnyJsonValue"
            required:
              - data
    Ledger_NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Ledger_LedgerErrorsContainer"
    rollup_Dedup:
      description: Successfully calculated dedup details for the provided address.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: "#/components/schemas/rollup_RollupAnyJsonValue"
              meta:
                $ref: "#/components/schemas/rollup_RollupAnyJsonValue"
            required:
              - data
              - meta
    rollup_BadRequest:
      description: The request sent was invalid.
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  $ref: "#/components/schemas/rollup_Error"
              meta:
                $ref: "#/components/schemas/rollup_RollupAnyJsonValue"
            required:
              - errors
              - meta
  schemas:
    Ledger_AnyJsonValue:
      oneOf:
        - type: string
          title: String
        - type: number
          title: Number
        - type: boolean
          title: Boolean
        - type: array
          title: Array
          items:
            x-stainless-any: true
        - type: object
          title: Object
          additionalProperties: true
    Ledger_RewardedAddresses:
      type: array
      items:
        type: string
        format: byte
    Ledger_ValidityConditions:
      type: array
      items:
        type: string
        format: byte
    IntOrHash:
      oneOf:
        - type: integer
          title: Integer
          description: Number
          format: uint64
        - $ref: "#/components/schemas/Hash"
    Ledger_CodeCommitment:
      type: string
      format: byte
    Ledger_AggregatedProofPublicData:
      type: object
      properties:
        rewarded_addresses:
          $ref: "#/components/schemas/Ledger_RewardedAddresses"
        validity_conditions:
          $ref: "#/components/schemas/Ledger_ValidityConditions"
        initial_slot_number:
          type: integer
          format: uint64
        final_slot_number:
          type: integer
          format: uint64
        genesis_state_root:
          type: string
          format: byte
        initial_state_root:
          type: string
          format: byte
        final_state_root:
          type: string
          format: byte
        initial_slot_hash:
          type: string
          format: byte
        final_slot_hash:
          type: string
          format: byte
        code_commitment:
          $ref: "#/components/schemas/Ledger_CodeCommitment"
      required:
        - rewarded_addresses
        - validity_conditions
        - initial_slot_number
        - final_slot_number
        - genesis_state_root
        - initial_state_root
        - final_state_root
        - initial_slot_hash
        - final_slot_hash
        - code_commitment
    AggregatedProof:
      type: object
      properties:
        type:
          type: string
          enum:
            - aggregatedProof
        public_data:
          $ref: "#/components/schemas/Ledger_AggregatedProofPublicData"
        proof:
          type: string
          format: byte
          description: Serialized aggregated proof, in Base64.
      required:
        - type
        - public_data
        - proof
    Ledger_Uint64Range:
      type: object
      properties:
        start:
          type: integer
          format: uint64
        end:
          type: integer
          format: uint64
      required:
        - start
        - end
    Slot:
      type: object
      properties:
        type:
          type: string
          enum:
            - slot
        number:
          type: integer
          format: uint64
        hash:
          $ref: "#/components/schemas/Hash"
        state_root:
          $ref: "#/components/schemas/Ledger_HexBytes"
        batch_range:
          $ref: "#/components/schemas/Ledger_Uint64Range"
        batches:
          type: array
          items:
            $ref: "#/components/schemas/Ledger_Batch"
        finality_status:
          type: string
          enum:
            - pending
            - finalized
      required:
        - type
        - number
        - hash
        - state_root
        - batch_range
        - finality_status
    Ledger_Batch:
      type: object
      properties:
        type:
          type: string
          enum:
            - batch
        number:
          type: integer
          format: uint64
        hash:
          $ref: "#/components/schemas/Hash"
        tx_range:
          $ref: "#/components/schemas/Ledger_Uint64Range"
        receipt:
          $ref: "#/components/schemas/Ledger_AnyJsonValue"
        txs:
          type: array
          items:
            $ref: "#/components/schemas/Ledger_Tx"
        slot_number:
          type: integer
          format: uint64
      required:
        - type
        - number
        - hash
        - tx_range
        - receipt
        - slot_number
    TxReceipt:
      type: object
      properties:
        result:
          type: string
          enum:
            - successful
            - reverted
            - skipped
      required:
        - result
    Ledger_Tx:
      type: object
      properties:
        type:
          type: string
          enum:
            - tx
        hash:
          $ref: "#/components/schemas/Hash"
        number:
          type: integer
          format: uint64
        event_range:
          $ref: "#/components/schemas/Ledger_Uint64Range"
        body:
          type: string
          format: byte
        receipt:
          $ref: "#/components/schemas/TxReceipt"
        events:
          type: array
          items:
            $ref: "#/components/schemas/Ledger_Event"
        batch_number:
          type: integer
          format: uint64
      required:
        - type
        - hash
        - number
        - event_range
        - body
        - receipt
        - batch_number
    Ledger_Event:
      type: object
      properties:
        type:
          type: string
          enum:
            - event
        number:
          type: integer
          format: uint64
        key:
          type: string
        value:
          type: object
          additionalProperties: true
        module:
          $ref: "#/components/schemas/Ledger_ModuleRef"
      required:
        - type
        - number
        - key
        - value
        - module
    Ledger_ModuleRef:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    Hash:
      type: string
      title: Hash
      pattern: ^0x[a-fA-F0-9]{64}$
      description: Hash
    Ledger_HexBytes:
      type: string
      pattern: ^0x[a-fA-F0-9]+$
      description: Hex-encoded byte sequence
    Ledger_LedgerError:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code related to this error
          example: 404
        title:
          type: string
          example: Entity not found
        details:
          type: object
      required:
        - status
        - title
    Ledger_LedgerErrorsContainer:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Ledger_LedgerError"
      required:
        - errors
    Sequencer_TxHash:
      type: string
      pattern: ^0x[a-fA-F0-9]+$
      description: The hash of a transaction
      example: "0x71c7656ec7ab88b098defb751b7401b5f6d8976f"
    Sequencer_TxBody:
      type: string
      format: byte
      description: The body of a transaction, encoded as a Base64 string
    TxInfo:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Sequencer_TxHash"
        status:
          $ref: "#/components/schemas/TxStatus"
      required:
        - id
        - status
    Sequencer_SubmittedTx:
      type: object
      properties:
        hash:
          $ref: "#/components/schemas/Sequencer_TxHash"
        body:
          $ref: "#/components/schemas/Sequencer_TxBody"
        status:
          $ref: "#/components/schemas/TxStatus"
      required:
        - hash
        - status
    TxStatus:
      type: string
      enum:
        - unknown
        - dropped
        - submitted
        - published
        - finalized
    SubmittedBatchInfo:
      type: object
      properties:
        da_height:
          type: integer
        num_txs:
          type: integer
          format: int32
      required:
        - da_height
        - num_txs
    Sequencer_SequencerError:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code related to this error
        title:
          type: string
        details:
          type: object
      required:
        - status
        - title
        - details
    rollup_BaseFeePerGas:
      type: object
      properties:
        base_fee_per_gas:
          $ref: "#/components/schemas/GasPrice"
      required:
        - base_fee_per_gas
    GasPrice:
      description: GasPrice is an array of u64
      type: array
      items:
        type: integer
        format: uint64
    GasUnit:
      description: GasUnit is an array of u64
      type: array
      items:
        type: integer
        format: uint64
    PartialTransaction:
      type: object
      properties:
        sender_pub_key:
          type: string
          format: byte
        nonce:
          type: integer
          format: uint64
        gas_price:
          $ref: "#/components/schemas/GasPrice"
        sequencer:
          type: string
          format: byte
        encoded_call_message:
          type: string
          format: byte
        details:
          $ref: "#/components/schemas/TxDetails"
      required:
        - sender_pub_key
        - nonce
        - encoded_call_message
        - details
    TxDetails:
      type: object
      properties:
        max_priority_fee_bips:
          type: integer
          format: uint64
        max_fee:
          type: integer
          format: uint64
        gas_limit:
          $ref: "#/components/schemas/GasUnit"
        chain_id:
          type: integer
          format: uint64
      required:
        - max_priority_fee_bips
        - max_fee
        - chain_id
    SimulateExecutionResponse:
      type: object
      properties:
        apply_tx_result:
          $ref: "#/components/schemas/ApplyTxResult"
      required:
        - apply_tx_result
    ApplyTxResult:
      type: object
      properties:
        receipt:
          $ref: "#/components/schemas/TxReceiptRollup"
        transaction_consumption:
          $ref: "#/components/schemas/TransactionConsumption"
      required:
        - receipt
        - transaction_consumption
    TransactionConsumption:
      type: object
      properties:
        remaining_funds:
          type: integer
          format: uint64
        base_fee:
          $ref: "#/components/schemas/GasUnit"
        priority_fee:
          type: integer
          format: uint64
        gas_price:
          $ref: "#/components/schemas/GasPrice"
      required:
        - remaining_funds
        - base_fee
        - priority_fee
        - gas_price
    TxReceiptRollup:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/StoredEvent"
        receipt:
          $ref: "#/components/schemas/TxEffect"
      required:
        - events
        - receipt
    StoredEvent:
      type: object
      properties:
        key:
          type: string
          format: byte
        value:
          type: string
          format: byte
      required:
        - key
        - value
    TxEffect:
      type: object
      properties:
        outcome:
          type: string
          enum:
            - successful
            - reverted
            - skipped
        content:
          type: string
          format: byte
      required:
        - outcome
        - content
    rollup_RollupAnyJsonValue:
      oneOf:
        - type: string
          title: String
        - type: number
          title: Number
        - type: boolean
          title: Boolean
        - type: array
          title: Array
          items:
            x-stainless-any: true
        - type: object
          title: Object
          additionalProperties: true
    rollup_Error:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code related to this error
        title:
          type: string
        details:
          type: object
      required:
        - status
        - title
        - details
    SyncStatus:
      oneOf:
        - type: object
          title: "synced"
          description: "The height of the fully synced node"
          properties:
            synced:
              type: object
              properties:
                synced_da_height:
                  type: integer
              required:
                - synced_da_height
          required:
            - synced
        - type: object
          title: "syncing"
          description: "The synced height and target height of the syncing node"
          properties:
            syncing:
              type: object
              properties:
                synced_da_height:
                  type: integer
                target_da_height:
                  type: integer
              required:
                - synced_da_height
                - target_da_height
          required:
            - syncing
x-tagGroups:
  - name: Sovereign SDK Ledger API
    tags:
      - Ledger
  - name: Sovereign SDK Sequencer API
    tags:
      - Sequencer
  - name: Sovereign SDK rollup API
    tags:
      - Rollup
