openapi: "3.0.2"
info:
  title: Sovereign SDK gas API
  version: 0.1.0
  description: |
    This is the JSON API for the Sovereign SDK gas data.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    name: Sovereign Labs
    url: https://github.com/Sovereign-Labs/sovereign-sdk
    email: info@sovereign.xyz
  x-displayName: gas
servers:
  - url: http://localhost:12346
    description: Localhost
paths:
  /base-fee-per-gas/latest:
    get:
      summary: Retrieve the latest base fee per gas
      operationId: get_latest_base_fee_per_gas
      tags:
        - Rollup
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BaseFeePerGas"
                  meta:
                    type: object
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Error"
                required:
                  - meta

components:
  schemas:
    BaseFeePerGas:
      type: object
      properties:
        base_fee_per_gas:
          $ref: "#/components/schemas/GasPrice"
      required:
        - base_fee_per_gas

    GasPrice:
      description: GasPrice is an array of u64
      type: array
      items:
        type: integer
        format: uint64

    Error:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code related to this error
        title:
          type: string
        details:
          type: object
      required:
        - status
        - title
        - details
