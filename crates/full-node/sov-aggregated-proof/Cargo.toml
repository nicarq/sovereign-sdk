[package]
name = "sov-aggregated-proof"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
risc0 = { path = "methods" }
hex = "0.4"
anyhow = "1"
risc0-zkvm = { version = "1.1" }
risc0-zkp = "1.1"
borsh = { version = "1", features = ["derive"] }


sov-mock-da = { path = "../../adapters/mock-da" }
sov-state = { path = "../../module-system/sov-state" }
sov-rollup-interface = { path = "../../rollup-interface" }
sov-modules-api = {path = "../../module-system/sov-modules-api"}

sov-risc0-adapter = { path = "../../adapters/risc0" }
sov-mock-zkvm = { path = "../../adapters/mock-zkvm" }


[features]
default = []
prove = ["risc0-zkvm/prove"]
