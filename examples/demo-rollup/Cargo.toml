[package]
name = "sov-demo-rollup"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = "sovereign.xyz"
publish = false
resolver = "2"
default-run = "sov-demo-rollup"

[lints]
workspace = true

[dependencies]
# non-optional dependencies
sov-celestia-adapter = { path = "../../adapters/celestia", features = ["native"] }
sov-mock-da = { path = "../../adapters/mock-da", features = ["native"] }
const-rollup-config = { path = "../const-rollup-config" }
sov-stf-runner = { path = "../../full-node/sov-stf-runner", features = ["native"] }
sov-rollup-interface = { path = "../../rollup-interface", features = ["native"] }
sov-prover-storage-manager = { path = "../../full-node/sov-prover-storage-manager" }

sov-modules-rollup-blueprint = { path = "../../module-system/sov-modules-rollup-blueprint" }
sov-kernels = { path = "../../module-system/sov-kernels" }
sov-modules-stf-blueprint = { path = "../../module-system/sov-modules-stf-blueprint", features = ["native"] }
sov-modules-api = { path = "../../module-system/sov-modules-api", features = ["native"] }
sov-nft-module = { path = "../../module-system/module-implementations/sov-nft-module" }
demo-stf = { path = "./stf", features = ["native"] }
sov-ledger-apis = { path = "../../full-node/sov-ledger-apis", features = ["server"] }
risc0 = { path = "./provers/risc0" }
borsh = { workspace = true, features = ["bytes"] }
async-trait = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
jsonrpsee = { workspace = true, features = ["http-client", "server"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
hex = { workspace = true, optional = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "time", "macros"]}
tracing-subscriber = { version = "0.3.17", features = ["env-filter"] }
prometheus_exporter = "0.8.5"

sov-db = { path = "../../full-node/sov-db" }
sov-ethereum = { path = "../../full-node/sov-ethereum", features = ["local"] }
sov-sequencer = { path = "../../full-node/sov-sequencer" }
sov-risc0-adapter = { path = "../../adapters/risc0", features = ["native"] }
sov-mock-zkvm = { path = "../../adapters/mock-zkvm", features = ["native"] }
sov-test-utils = { path = "../../module-system/sov-test-utils", optional = true } # Only needed for nft script
sov-state = { path = "../../module-system/sov-state", features = ["native"] }
sov-cli = { path = "../../module-system/sov-cli" }
clap = { workspace = true }
secp256k1 = { workspace = true }

[dev-dependencies]
sov-rng-da-service = { path = "../../utils/rng-da-service" }
sov-rollup-interface = { path = "../../rollup-interface", features = ["arbitrary"] }
sov-prover-storage-manager = { path = "../../full-node/sov-prover-storage-manager", features = ["test-utils"] }
sov-mock-da = { path = "../../adapters/mock-da" }
sov-bank = { path = "../../module-system/module-implementations/sov-bank", features = ["native"] }
sov-nft-module = { path = "../../module-system/module-implementations/sov-nft-module", features = ["native"] }
sov-modules-macros = { path = "../../module-system/sov-modules-macros" }
sov-test-utils = { path = "../../module-system/sov-test-utils" }
sov-value-setter = { path = "../../module-system/module-implementations/sov-value-setter", features = ["native"] }
humantime = "2.1"
reth-primitives = { workspace = true }

hex = { workspace = true }
bincode = { workspace = true }
sha2 = { workspace = true }
tempfile = { workspace = true }
proptest = { workspace = true }
tokio = { workspace = true, features = ["full"]}
rand = { workspace = true }

ethereum-types = { workspace = true }
ethers-core = { workspace = true }
ethers-contract = { workspace = true }
ethers-middleware = { workspace = true }
ethers-providers = { workspace = true }
ethers-signers = { workspace = true }
revm = { workspace = true }

reqwest = { version = "0.12", features = ["rustls-tls", "http2"], default-features = false }
tendermint = "0.32"
prometheus = "0.11.0"
prettytable-rs = "^0.10"
criterion = "0.5.1"
log = "0.4"
log4rs = "1.0"
regex = "1.10"

[features]
default = []
nft-script = [ "sov-test-utils" ]

bench = [
	"hex",
	"risc0/bench",
	"sov-celestia-adapter/bench",
	"sov-modules-api/bench",
	"sov-modules-stf-blueprint/bench",
	"sov-risc0-adapter/bench",
	"sov-state/bench",
]
offchain = [ "demo-stf/offchain", "sov-nft-module/offchain" ]

[[bench]]
name = "rollup_bench"
path = "benches/node/rollup_bench.rs"
harness = false
required-features = ["bench"]

[[bench]]
name = "rollup_coarse_measure"
path = "benches/node/rollup_coarse_measure.rs"
harness = false
required-features = ["bench"]

[[bench]]
name = "prover_bench"
path = "benches/prover/prover_bench.rs"
harness = false
required-features = ["bench"]

[[bin]]
name = "sov-cli"
path = "src/sov-cli/main.rs"

[[bin]]
name = "sov-nft-script"
path = "src/bin/sov_nft_script.rs"
required-features = ["nft-script"]

[[bin]]
name = "sov-demo-rollup"
path = "src/main.rs"
