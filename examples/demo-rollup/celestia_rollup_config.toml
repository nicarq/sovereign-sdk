[da]
# The JWT used to authenticate with the celestia light client. Instructions for generating this token can be found in the README
celestia_rpc_auth_token = "MY.SECRET.TOKEN"
# The address of the *trusted* Celestia light client to interact with
celestia_rpc_address = "http://127.0.0.1:26658"
# The largest response the rollup will accept from the Celestia node. Defaults to 100 MB
max_celestia_response_body_size = 104_857_600
# The maximum time to wait for a response to an RPC query against Celestia node. 
# Default: 60 seconds
# We set it to allow skipping 3 blocks on mocha testnet
celestia_rpc_timeout_seconds = 18

# Options are "Low", "Medium" and "High"
# Defines a priority of rollup blob transactions. Set it to "High" for faster inclusion.
# Default: Medium
#tx_priority = "High"

# Exponential backoff configuration for retrying failed requests to Celestia node
# Minimal time to wait before reattempting to request to celestia node.
# Default: 100 milliseconds
backoff_min_delay_ms = 200
# Maximal time between reattempting to request to the celestia node.
# Default: 12000 milliseconds (12 seconds)
backoff_max_delay_ms = 6_000
# Number of requests attempted on the celestia node before returning an error.
# Default: 60
backoff_max_times = 10
# Exponential factor for reattempting failed requests
# Default: 2.0
# backoff_factor = 2.0


# WITH CURRENT UNCOMMENTED VALUES:
# Timeout per request: 18 seconds
# Backoff: min=200ms, max=6s, attempts=10, factor=2.0
# Retry pattern: 200ms, 400ms, 800ms, 1.6s, 3.2s, 6s, 6s, 6s, 6s, 6s (last 5 capped at max)
# Total backoff waiting: 200ms + 400ms + 800ms + 1.6s + 3.2s + 6s + 6s + 6s + 6s + 6s = ~36.2s
# Total request timeouts: 10 * 18s = 180s
# Maximum total time: ~216s (3.6 minutes)
#
# Default values result in the following retry pattern:
# Attempts 1-9: 100ms, 200ms, 400ms, 800ms, 1.6s, 3.2s, 6.4s, 12s, 12s (capped)
# Attempts 10-60: 12s each (51 more attempts)
# Total backoff waiting time with defaults: ~51s (first 9) + 612s (remaining 51) = ~663s (11 minutes)
# Total time with defaults including timeouts: 60 * 60s = 3600s (60 minutes) for all request timeouts

[storage]
# The path to the rollup's data directory. Paths that do not begin with `/` are interpreted as relative paths.
path = "demo_data"
state_cache_size = 4294967296 # 4GB. Default is 1GB.

# We define the rollup's genesis to occur at block number `genesis_height`. The rollup will ignore
# any blocks before this height, and any blobs at this height will not be processed
[runner]
genesis_height = 3
# Block time for celestia is configured in `docker/run-validator.sh` and we try to set this one to be lower,
# So status is updated more frequently.
da_polling_interval_ms = 500
# Celestia configured to give ~216s to retry, so we limit it at 300 to eliminate any locks or slow read.
# This field is the safeguard against any long blocking in DaService.
# The default value is: 600
da_total_timeout_secs = 300

[runner.http_config]
bind_host = "127.0.0.1"
bind_port = 12346
# In case the rollup is running behind a proxy
# public_address = "http://rollup.sovereign.xyz"

[monitoring]
telegraf_address = "udp://127.0.0.1:8094"
# Defines how many measurements a rollup node will accumulate before sending it to the Telegraf.
# It is expected from the rollup node to produce metrics all the time,
# so measurements are buffered by size and not sent by time.
# and below 67 KB, which is the maximal UDP packet size.
# It also means that if a single serialized metric is larger than this value, a UDP packet will be larger.
# The default value is 508.
# max_datagram_size = 508
# How many metrics are allowed to be in pending state, before new metrics will be dropped.
# This is a number of metrics, not serialized bytes.
# The total number of bytes to be held in memory might vary per metric + `max_datagram_size`
# max_pending_metrics = 100

[proof_manager]
aggregated_proof_block_jump = 10
prover_address = "sov1lzkjgdaz08su3yevqu6ceywufl35se9f33kztu5cu2spja5hyyf"
max_number_of_transitions_in_db = 100
max_number_of_transitions_in_memory = 30

[sequencer]
# This value is counted between sequencer receiving receipt from DA about inclusion till node has processed this blob.
blob_processing_timeout_secs = 600
max_batch_size_bytes = 1048576
max_concurrent_blobs = 128
max_allowed_node_distance_behind = 10
rollup_address = "sov1lzkjgdaz08su3yevqu6ceywufl35se9f33kztu5cu2spja5hyyf"
[sequencer.preferred]
# TODO: Remove it when https://github.com/Sovereign-Labs/sovereign-sdk-wip/issues/2814 is resolved
disable_state_root_consistency_checks = true
# Strategy for handling recovery scenarios when the sequencer is too far behind.
# "None" - Shutdown the sequencer instead of attempting recovery (default)
# "TryToSave" - Attempt to recover by flushing batches and catching up with the chain
recovery_strategy = "TryToSave"
batch_execution_time_limit_millis = 12000 # Do no more than 12 seconds worth of work per batch, even if the DA layer isn't producing blocks regularly
# The sequencer optimistically pre-executes transactions across multiple worker threads.
# This warms up caches so the main transaction executor can run with ready-to-use data.
# This variable determines the number of worker threads.
num_cache_warmup_workers = 5
[sequencer.extension]
max_log_limit = 20000