[package]
name = "demo-stf"
version = { workspace = true }
edition = { workspace = true }
resolver = "2"
authors = { workspace = true }
license = { workspace = true }
homepage = "sovereign.xyz"
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
borsh = { workspace = true }
serde = { workspace = true }
jsonrpsee = { workspace = true, features = ["jsonrpsee-http-client", "server-core", "tokio"], optional = true }
tokio = { workspace = true, features = ["sync"], optional = true }
tracing = { workspace = true }

sov-stf-runner = { path = "../../../full-node/sov-stf-runner" }
sov-rollup-interface = { path = "../../../rollup-interface" }
sov-cli = { path = "../../../module-system/sov-cli", optional = true }
sov-sequencer-registry = { path = "../../../module-system/module-implementations/sov-sequencer-registry" }
sov-prover-incentives = { path = "../../../module-system/module-implementations/sov-prover-incentives" }
sov-bank = { path = "../../../module-system/module-implementations/sov-bank" }
sov-nft-module = { path = "../../../module-system/module-implementations/sov-nft-module" }
sov-kernels = { path = "../../../module-system/sov-kernels" }
sov-capabilities = { path = "../../../module-system/sov-capabilities" }

sov-mock-da = { path = "../../../adapters/mock-da" }
sov-chain-state = { path = "../../../module-system/module-implementations/sov-chain-state" }
sov-modules-stf-blueprint = { path = "../../../module-system/sov-modules-stf-blueprint" }
sov-value-setter = { path = "../../../module-system/module-implementations/sov-value-setter" }
sov-accounts = { path = "../../../module-system/module-implementations/sov-accounts" }
sov-nonces = { path = "../../../module-system/module-implementations/sov-nonces" }
sov-state = { path = "../../../module-system/sov-state" }
sov-modules-api = { path = "../../../module-system/sov-modules-api" }
sov-evm = { path = "../../../module-system/module-implementations/sov-evm" }

[dev-dependencies]
demo-stf = { path = ".", features = ["native"] }
tempfile = { workspace = true }
rand = { workspace = true }
sov-test-utils = { path = "../../../module-system/sov-test-utils" }
sov-mock-zkvm = { path = "../../../adapters/mock-zkvm" }
sov-modules-stf-blueprint = { path = "../../../module-system/sov-modules-stf-blueprint", features = ["test-utils"] }
sov-prover-storage-manager = { path = "../../../full-node/sov-prover-storage-manager", features = ["test-utils"] }

[features]
default = []
offchain = ["demo-stf/offchain", "sov-nft-module/offchain"]
native = [
    "demo-stf/native",
    "jsonrpsee",
    "sov-accounts/native",
    "sov-bank/native",
    "sov-capabilities/native",
    "sov-chain-state/native",
    "sov-cli",
    "sov-evm/native",
    "sov-kernels/native",
    "sov-mock-da/native",
    "sov-mock-zkvm/native",
    "sov-modules-api/native",
    "sov-modules-stf-blueprint/native",
    "sov-nft-module/native",
    "sov-nonces/native",
    "sov-prover-incentives/native",
    "sov-rollup-interface/native",
    "sov-sequencer-registry/native",
    "sov-state/native",
    "sov-stf-runner/native",
    "sov-value-setter/native",
    "tokio",
]
