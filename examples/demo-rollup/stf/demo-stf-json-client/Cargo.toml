[package]
name = "demo-stf-json-client"
version = "0.3.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Sovereign Labs <info@sovereign.xyz>"]
homepage = "https://www.sovereign.xyz"
resolver = "2"
publish = false

[lints.rust]
dead_code = "deny"
non_ascii_idents = "deny" # Bad for readability and it can also be a security vulnerability

# In case you need inspiration for new lints to add to the list, this is a good
# reference: <https://github.com/EmbarkStudios/rust-ecosystem/blob/6783ae1573d62f3f5439b8ff9e04bec191ec2eaf/lints.toml>.
[lints.clippy]
debug_assert_with_mut_call = "deny"
inefficient_to_string = "deny"
map_flatten = "deny"
manual_ok_or = "deny"
doc_link_with_quotes = "deny"
match_same_arms = "deny"
semicolon_if_nothing_returned = "deny"
float_arithmetic = "deny"              # Can cause subtle bugs due to different behavior between native and zkVM execution.



# These dependencies are not defined through workspace inheritance because
# `progenitor` demands very specific version ranges for its dependencies. Read
# more here: <https://github.com/oxidecomputer/progenitor>.
[dependencies]
futures = "0.3"
progenitor-client = { version = "0.8" }
regress = "0.4.1"
reqwest = { version = "0.12", features = ["rustls-tls", "json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }

[build-dependencies]
prettyplease = "0.2.22"
sov-address = { path = "../../../../crates/module-system/sov-address", features = ["evm"] }
progenitor = { version = "0.8" }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }
syn = "2.0"
demo-stf = { path = "../../stf", features = ["native"] }

sov-modules-api = { path = "../../../../crates/module-system/sov-modules-api", default-features = false }
sov-mock-zkvm = { path = "../../../../crates/adapters/mock-zkvm", default-features = false, features = ["native"] }
sov-mock-da = { path = "../../../../crates/adapters/mock-da", default-features = false, features = ["native"] }
