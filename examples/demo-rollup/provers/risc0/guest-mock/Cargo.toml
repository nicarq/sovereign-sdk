[package]
name = "sov-demo-prover-guest-mock"
version = "0.3.0"
license = "Sovereign Labs Community Software License"
edition = "2021"
resolver = "2"

[workspace]

[dependencies]
risc0-zkvm = { version = "1.0.5", default-features = false, features = ["std"] }
risc0-zkvm-platform = { version = "1.0.5" }
sov-mock-da = { path = "../../../../../crates/adapters/mock-da" }
demo-stf = { path = "../../../stf" }
sov-risc0-adapter = { path = "../../../../../crates/adapters/risc0" }
sov-mock-zkvm = { path = "../../../../../crates/adapters/mock-zkvm" }
sov-modules-api = { path = "../../../../../crates/module-system/sov-modules-api" }
sov-state = { path = "../../../../../crates/module-system/sov-state" }
sov-modules-stf-blueprint = { path = "../../../../../crates/module-system/sov-modules-stf-blueprint" }
sov-kernels = { path = "../../../../../crates/module-system/sov-kernels" }
proc-macro-crate = "=2.0.0"

[patch.crates-io]
sha2 = { git = "https://github.com/risc0/RustCrypto-hashes", tag = "sha2-v0.10.8-risczero.0" }
ed25519-dalek = { git = "https://github.com/risc0/curve25519-dalek", tag = "curve25519-4.1.0-risczero.1" }
crypto-bigint = { git = "https://github.com/risc0/RustCrypto-crypto-bigint", tag = "v0.5.2-risc0" }
secp256k1 = { package = "secp256k1", version = "0.29", git = "https://github.com/Sovereign-Labs/rust-secp256k1.git", rev = "3769ab9b2227d430ca2c58546daf3680017cfefb" }


[profile.dev]
opt-level = 3

[profile.dev.build-override]
opt-level = 3

[profile.release]
debug = 1
lto = true

[profile.release.build-override]
opt-level = 3

[features]
bench = ["sov-modules-api/bench", "sov-state/bench", "sov-modules-stf-blueprint/bench"]
bincode = ["sov-risc0-adapter/bincode"]
