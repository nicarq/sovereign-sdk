[package]
name = "sov-benchmarks"
version = { workspace = true }
edition = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
publish = false
resolver = "2"

[lints]
workspace = true

[dependencies]
# Sovereign dependencies
sov-rollup-interface = { workspace = true, features = ["arbitrary"] }
sov-modules-api = { workspace = true, features = ["arbitrary", "bench"] }
sov-test-utils = { workspace = true, features = ["arbitrary"] }
sov-mock-da = { workspace = true, features = ["arbitrary"] }
sov-celestia-adapter = { workspace = true, features = ["arbitrary", "bench"]}
sov-cycle-utils = { workspace = true }
sov-sequencer = { workspace = true }
sov-address = { workspace = true }
sov-state = { workspace = true, features = ["arbitrary"] }
sov-modules-stf-blueprint = { workspace = true, features = ["bench"] }
sov-transaction-generator = { workspace = true }

demo-stf = { workspace = true, features = ["test-utils"] }
sov-demo-rollup = { workspace = true }

sov-risc0-adapter = { workspace = true, features = ["arbitrary", "bench"] }
sov-sp1-adapter = { workspace = true, features = ["arbitrary", "bench"] }
sov-modules-rollup-blueprint = { workspace = true }

# Provers
risc0 = { path = "../provers/risc0", features = ["bench"] }
sp1 = { path = "../provers/sp1", features = ["bench"] }

# Other dependencies
derive_more = { workspace = true }
tracing = { workspace = true }
prettytable-rs = "^0.10"
criterion = "0.5.1"
borsh = { workspace = true }
derivative = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
humantime = "2.1"
hex = { workspace = true }
tempfile = { workspace = true }
strum = { workspace = true }

[[bench]]
name = "rollup_bench"
path = "src/node/rollup_bench.rs"
harness = false

[[bench]]
name = "rollup_coarse_measure"
path = "src/node/rollup_coarse_measure.rs"
harness = false
