[package]
name = "sov-benchmarks"
version = "0.3.0"
edition = "2021"
license = "MIT OR Apache-2.0"
authors = ["Sovereign Labs <info@sovereign.xyz>"]
homepage = "https://www.sovereign.xyz"
publish = false
resolver = "2"

[dependencies]
# Sovereign dependencies
sov-rollup-interface = { path = "../../../crates/rollup-interface", features = ["arbitrary"] }
sov-modules-api = { path = "../../../crates/module-system/sov-modules-api", features = ["arbitrary", "bench"] }
sov-test-utils = { path = "../../../crates/module-system/sov-test-utils", features = ["arbitrary"] }
sov-sequencer = { path = "../../../crates/full-node/sov-sequencer", default-features = false }
sov-address = { path = "../../../crates/module-system/sov-address" }
sov-state = { path = "../../../crates/module-system/sov-state", features = ["arbitrary"] }
sov-modules-stf-blueprint = { path = "../../../crates/module-system/sov-modules-stf-blueprint", features = ["bench"] }
sov-transaction-generator = { path = "../../../crates/utils/transaction-generator" }
sov-modules-rollup-blueprint = { path = "../../../crates/module-system/sov-modules-rollup-blueprint", default-features = false }

sov-mock-da = { path = "../../../crates/adapters/mock-da", features = ["arbitrary", "native"] }
sov-celestia-adapter = { path = "../../../crates/adapters/celestia", features = ["arbitrary", "bench", "native"] }

sov-cycle-utils = { git = "https://github.com/Sovereign-Labs/risc0-cycle-macros.git", rev = "7c3995c0a517465f28f915e9da22f54960198503" }

demo-stf = { path = "../stf", features = ["test-utils"] }

sov-risc0-adapter = { path = "../../../crates/adapters/risc0", features = ["arbitrary", "bench", "native"] }
sov-sp1-adapter = { path = "../../../crates/adapters/sp1", features = ["arbitrary", "bench", "native"] }

# Provers
risc0 = { path = "../provers/risc0", features = ["bench"] }
sp1 = { path = "../provers/sp1", features = ["bench"] }

# Other dependencies
derive_more = { version = "1.0", default-features = false, features = ["std"] }
tracing = { version = "0.1.40", default-features = false }
prettytable-rs = "^0.10"
criterion = "0.5.1"
borsh = { version = "1", features = ["derive"] }
derivative = { version = "2.2", features = ["use_core"] }
anyhow = { version = "1.0.86" }
serde = { version = "1.0.208", default-features = false, features = [
    "alloc",
    "derive",
] }
serde_json = { version = "1.0", default-features = false, features = ["alloc"] }
tokio = { version = "1.42", default-features = false }
humantime = "2.1"
hex = { version = "0.4.3" }
tempfile = "3.12"
strum = { version = "0.26.3", features = ["derive"] }
# To keep compatiblity with rust 1.79
home = { version = "=0.5.9" }

[[bench]]
name = "rollup_bench"
path = "src/node/rollup_bench.rs"
harness = false

[[bench]]
name = "rollup_coarse_measure"
path = "src/node/rollup_coarse_measure.rs"
harness = false
