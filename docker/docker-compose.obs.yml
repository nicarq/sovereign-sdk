services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring-network
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources/
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - monitoring-network
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-network
  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo's query port
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./grafana-tempo/tempo.yaml:/etc/tempo.yaml:ro
      - ./grafana-tempo/data:/tmp/tempo
    networks:
      - monitoring-network
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "127.0.0.1:${INFLUX_PORT:-8086}:${INFLUX_PORT:-8086}"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=sovereign
      - DOCKER_INFLUXDB_INIT_BUCKET=sov-rollup
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=sovereign
    volumes:
      - type: bind
        source: ./influxdb-data
        target: /var/lib/influxdb2
        consistency: consistent
    networks:
      - monitoring-network
  telegraf:
    image: telegraf:1.27
    container_name: telegraf
    depends_on:
      - influxdb
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    ports:
      - "127.0.0.1:${TELEGRAF_PORT:-8094}:${TELEGRAF_PORT:-8094}/udp"
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    networks:
      - monitoring-network
  grafana-alloy:
    image: grafana/alloy:v1.5.1
    container_name: grafana-alloy
    ports:
      - "127.0.0.1:3101:3101"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./grafana-alloy/config.local.alloy:/etc/alloy/config.alloy
      - ./grafana-alloy/storage:/var/lib/alloy/data
    networks:
      - monitoring-network
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:3101
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy

networks:
  monitoring-network:
