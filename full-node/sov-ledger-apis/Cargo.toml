[package]
name = "sov-ledger-apis"
authors = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
description = "JSON-RPC server and client implementations for Sovereign SDK rollups"
repository = { workspace = true }

version = { workspace = true }
resolver = "2"
publish = true

[lints]
workspace = true

[dependencies]
# Common dependencies
jsonrpsee = { workspace = true }
tokio = { workspace = true }
borsh = { workspace = true }
serde = "1"
serde_json = "1"
sov-rollup-interface = { path = "../../rollup-interface", features = ["native"], version = "0.3" }
# Client dependencies
# (None)
# Server dependencies
anyhow = { version = "1", optional = true }
futures = { workspace = true, optional = true }
sov-modules-api = { path = "../../module-system/sov-modules-api", features = ["native"], optional = true, version = "0.3" }

[dev-dependencies]
tempfile = "3"
sov-db = { path = "../../full-node/sov-db" }
tokio = { workspace = true, features = ["full"] }
sov-ledger-apis = { path = ".", features = ["client", "server"] }
sov-mock-da = { path = "../../adapters/mock-da", features = ["native"], version = "0.3" }
sov-test-utils = { path = "../../module-system/sov-test-utils" }
demo-stf = { path = "../../examples/demo-rollup/stf", features = ["native"], version = "0.3" }

[features]
default = [ "client", "server" ]
server = [ "anyhow", "futures", "jsonrpsee/server", "sov-modules-api" ]
client = [ "jsonrpsee/client", "jsonrpsee/macros" ]
